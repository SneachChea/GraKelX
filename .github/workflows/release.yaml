# Workflow to build and test wheels
# =================================
# This github action gets triggered whenever a git tag (matching v*) is pushed,
# or manually via workflow_dispatch. It generates both wheels and distributions
# files, making sure their contents are correct via unit-testing.
#
# Please note that creating a git tag and pushing it (git tag <>; git push --tags) is not
# sufficient to append the wheels and distribution files to your release.
# You need to generate a new release using github, not git.
#
# Guides
# ------
# cibuildwheel docs:
# * https://cibuildwheel.readthedocs.io/en/stable/options/
# github actions:
# * https://docs.github.com/en/actions

name: Wheel builder

on:
  # Manual trigger on github
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to PyPI"
        required: false
        type: boolean

  # Tag push (e.g. v0.1.12, v1.0.0)
  push:
    tags:
      - "v*"

env:
  package-name: grakelx

  test-cmd: pytest
  sdist-version: "3.10"

jobs:

  build_wheels:
    name: Wheels ${{ matrix.os }}-${{ matrix.py }}
    runs-on: ${{ matrix.os }}

    # Parellilize as much as possible across github action workers
    strategy:
      # 1 runner per combination of (os, py)
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        py: ["cp310", "cp311", "cp312", "cp313"]
      # All workers independent, don't cancel all if one fails
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      # Let's us build aarch64 on linux
      - name: Set up QEMU
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

        # https://cibuildwheel.readthedocs.io/en/stable/options
      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          CIBW_BUILD_FRONTEND: "build"
          CIBW_BUILD: ${{ matrix.py }}-*
          CIBW_ARCHS_MACOS: x86_64 universal2
          CIBW_ARCHS_LINUX: x86_64 aarch64
          # No win32 ("x86") for Windows as scipy declared it has stopped releasing wheels
          # from 1.8.0 onwards, officially from 1.9.3
          CIBW_ARCHS_WINDOWS: AMD64
          # Install test requirements and run the test-cmd
          CIBW_TEST_REQUIRES: "pytest pytest-cov"
          # {project} is a special string recognized by CIBW and replaced with the project dir
          CIBW_TEST_COMMAND: ${{ env.test-cmd }} {project}/tests
          # * Scipy has no wheels released for musllinux and will not build because OpenBLAS is not found
          CIBW_SKIP: "*-musllinux*"
          # https://cibuildwheel.readthedocs.io/en/stable/options/#test-skip
          # * Will avoid testing on emulated architectures (aarch64)
          # * Skip trying to test arm64 builds on Intel Macs
          CIBW_TEST_SKIP: "*-*linux_aarch64 *-macosx_universal2:arm64"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.py }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: sdist
    runs-on: ubuntu-latest

    steps:
      - name: Checkout ${{ env.package-name }}
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.sdist-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Build source distribution
        run: |
          uv build --sdist
          echo "sdist_name=$(ls -t dist/${{ env.package-name }}-*.tar.gz | head -n 1)" >> $GITHUB_ENV

      - name: Twine check ${{ env.package-name }}
        run: |
          python -m pip install twine
          twine check --strict ${{ env.sdist_name }}

      - name: Extract and test source distribution
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-cov
          tar -xzf ${{ env.sdist_name }} -C /tmp
          sdist_dir="/tmp/${{ env.package-name }}-$(echo ${{ env.sdist_name }} | sed 's/.*-\([0-9.]*\)\.tar\.gz/\1/')"
          # Install the sdist. This builds the Cython extensions (Cython is a
          # build-system requirement, installed in an isolated build env) and
          # installs the package with its compiled .so files into site-packages.
          python -m pip install "$sdist_dir"
          # Run pytest from /tmp so `grakelx` resolves from site-packages.
          # The runner CWD is the source checkout (`/home/runner/work/...`),
          # whose `grakelx/` directory has no compiled .so files and would
          # shadow the installed package, failing with:
          #   cannot import name 'k_to_ij_rectangular' from
          #   'grakelx.kernels._c_functions' (unknown location)
          # /tmp has no `grakelx/` subdir, so the installed package wins.
          (cd /tmp && ${{ env.test-cmd }} "$sdist_dir/tests")

      - name: Verify installed package
        run: |
          cd /tmp && python -c "import grakelx; print(f'grakelx {grakelx.__version__} installed successfully')"

      - name: Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  release_assets:
    # Only when manually specified
    if: ${{ inputs.deploy }}

    name: Upload Release
    runs-on: ubuntu-latest
    needs: [build_wheels, build_sdist]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Display structure of downloaded files
        run: |
          ls -R dist

      - name: Publish a Python distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
            password: ${{ secrets.PYPI_API_TOKEN }}
            packages_dir: dist/
