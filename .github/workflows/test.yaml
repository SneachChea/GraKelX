name: Tests

on:
  # Allow to manually trigger through github API
  workflow_dispatch:

  push:
    branches:
      - main

  pull_request:
    types: [ready_for_review]
    branches:
      - main

  schedule:
    # https://crontab.guru/#42_2_3_*_*
    # "At 02:42 on day-of-month 3"
    # Put it at this odd time to reduce competing with load spikes on github action servers
    - cron: '42 2 3 * *'

env:

  import-package-name: grakelx
  test-dir: tests

jobs:

  # General unit tests
  source-test:
    name: ${{ matrix.py }}-${{ matrix.os }}

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash # Default to using bash on all

    strategy:
      fail-fast: false
      matrix:
        py: ["3.10", "3.11", "3.12", "3.13"]
        os: ["ubuntu-latest", "macos-latest", "windows-latest"]

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.py }}

    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        cache-python: true
    - name: Install ccache
      run: |
        if [[ "$RUNNER_OS" == "Windows" ]]; then choco install ccache; else sudo apt-get install -y ccache || brew install ccache; fi
      continue-on-error: true
    - name: Restore ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ runner.os }}-${{ matrix.py }}-${{ hashFiles('setup.py', 'grakelx/kernels/_c_functions/functions.pyx', 'grakelx/kernels/_c_functions/include/functions.hpp', 'grakelx/kernels/_c_functions/src/ArashPartov.cpp', 'grakelx/kernels/_c_functions/src/sm_core.cpp', 'grakelx/kernels/_isomorphism/bliss.pyx', 'grakelx/kernels/_isomorphism/intpyblissmodule_2.cc', 'grakelx/kernels/_isomorphism/intpyblissmodule_3.cc', 'grakelx/kernels/_isomorphism/bliss-0.50/**') }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ matrix.py }}-
    - name: Setup ccache symlinks
      run: |
        BIN_DIR="$RUNNER_TEMP/ccache_bin"
        mkdir -p "$BIN_DIR"
        if command -v ccache >/dev/null 2>&1; then
          CCACHE_BIN=$(command -v ccache)
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            for cc in cc gcc g++ c++ clang clang++; do
              cp "$CCACHE_BIN" "$BIN_DIR/${cc}.exe"
            done
            echo "$BIN_DIR" >> "$GITHUB_PATH"
          else
            for cc in cc gcc g++ c++ clang clang++; do
              ln -sf "$CCACHE_BIN" "$BIN_DIR/$cc"
            done
            echo "$BIN_DIR" >> "$GITHUB_PATH"
          fi
        else
          echo "ccache not found — skipping symlinks, build will proceed without caching"
        fi
    - name: Install dependencies
      run: uv sync --group test

    - name: Build Cython extensions
      run: uv run python setup.py build_ext --inplace

    - name: Tests
      run: uv run pytest
